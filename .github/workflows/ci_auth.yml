name: CI Auth Service

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'ms-auth/**'
      - '.github/workflows/ci_auth.yml'

  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'ms-auth/**'
      - '.github/workflows/ci_auth.yml'

jobs:
  flake8:
    name: Flake8
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ms-auth/authentification

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        run: pip install "poetry==2.3.2"

      - name: Sync lock file with pyproject
        run: poetry lock

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run flake8
        continue-on-error: true
        run: |
          pip install flake8
          flake8 .

  sonarqube:
    name: SonarCloud
    runs-on: ubuntu-latest
    needs: []

    defaults:
      run:
        working-directory: ms-auth/authentification

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        run: pip install "poetry==2.3.2"

      - name: Sync lock file with pyproject
        run: poetry lock

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: SonarQube Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: ms-auth/authentification