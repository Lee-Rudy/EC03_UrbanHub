name: CI Auth Service

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'ms-auth/**'
      - '.github/workflows/ci_auth.yml'

  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'ms-auth/**'
      - '.github/workflows/ci_auth.yml'

jobs:
  flake8:
    name: Flake8
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ms-auth/authentification

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run flake8
        run: poetry run flake8 .

  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    needs: flake8

    defaults:
      run:
        working-directory: ms-auth/authentification

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: ms-auth/authentification