name: CI Auth Service

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'ms-auth/**'
      - '.github/workflows/ci_auth.yml'

  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'ms-auth/**'
      - '.github/workflows/ci_auth.yml'

jobs:
  flake8:
    name: Flake8
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ms-auth/authentification

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        run: pip install "poetry==2.3.2"

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run flake8
        run: |
          pip install flake8
          flake8 . --max-line-length=120 --extend-ignore=W292,W391

  sonarqube:
    name: SonarCloud
    runs-on: ubuntu-latest
    needs: flake8

    defaults:
      run:
        working-directory: ms-auth/authentification

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        run: pip install "poetry==2.3.2"

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run tests with coverage XML
        env:
          PYTHONPATH: src
        run: |
          mkdir -p reports
          poetry run pytest -q --cov=src --cov-config=.coveragerc --cov-report=xml:reports/coverage.xml

      - name: Check coverage file
        run: |
          ls -la reports
          grep -n "filename=" reports/coverage.xml | head -20

      - name: SonarQube Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: ms-auth/authentification
          args: >
            -Dsonar.projectKey=lee-rudy_ec03_urbanhub
            -Dsonar.organization=lee-rudy
            -Dsonar.sources=src
            -Dsonar.tests=tests
            -Dsonar.python.version=3.13
            -Dsonar.python.coverage.reportPaths=reports/coverage.xml
            -Dsonar.sourceEncoding=UTF-8