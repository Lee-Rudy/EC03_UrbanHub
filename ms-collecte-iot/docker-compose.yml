version: "3.9"

services:

  ms-collecte-iot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ms-collecte-iot
    image: ghcr.io/lee-rudy/ec03_urbanhub/ms-collecte-iot:local
    ports:
      - "8001:8000"
    env_file:
      - .env
    depends_on:
      - mqtt-broker
    networks:
      - iot-net

  ms-collecte-iot-test:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: ms-collecte-iot-test
    depends_on:
      - mqtt-broker
    networks:
      - iot-net
    profiles:
      - test

  mqtt-broker:
    image: eclipse-mosquitto:2.0
    container_name: mqtt-broker
    ports:
      - "1883:1883"
    networks:
      - iot-net

networks:
  iot-net:
    driver: bridge
