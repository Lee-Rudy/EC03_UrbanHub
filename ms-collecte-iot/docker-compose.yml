version: "3.9"

services:

  # ── Kafka (KRaft mode — no Zookeeper needed) ───────────────
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 8
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - iot-net

  # ── MongoDB ────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=urbanhub_collecte
    volumes:
      - mongo_data:/data/db
    networks:
      - iot-net

  # ── MS Collecte IoT ────────────────────────────────────────
  ms-collecte-iot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ms-collecte-iot
    image: ghcr.io/lee-rudy/ec03_urbanhub/ms-collecte-iot:local
    ports:
      - "8002:8002"
    env_file:
      - .env
    depends_on:
      kafka:
        condition: service_healthy
      mongodb:
        condition: service_started
    networks:
      - iot-net

  # ── Tests (lancés manuellement via --profile test) ─────────
  ms-collecte-iot-test:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: ms-collecte-iot-test
    depends_on:
      kafka:
        condition: service_healthy
      mongodb:
        condition: service_started
    networks:
      - iot-net
    profiles:
      - test

volumes:
  mongo_data:

networks:
  iot-net:
    driver: bridge
